<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description | escape }}">
    <link rel="icon" href="{{ '/assets/favicon.svg' | relative_url }}" type="image/svg+xml">
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <a class="site-title" href="{{ '/' | relative_url }}">
          <span class="site-title__emoji" data-random-header-emoji aria-hidden="true">✨</span>
          <span>{{ site.title }}</span>
        </a>
        <nav class="site-nav" aria-label="Primary navigation">
          <a href="{{ '/blog/' | relative_url }}">Blog</a>
          <a href="{{ '/paintings/' | relative_url }}">Paintings</a>
          <a href="{{ '/projects/' | relative_url }}">Projects</a>
          <a href="{{ '/about/' | relative_url }}">About</a>
        </nav>
      </div>
    </header>

    <main class="site-main{% if page.home %} site-main--home{% endif %}">
      {{ content }}
    </main>

    <footer class="site-footer">
      <nav class="footer-links" aria-label="Footer navigation">
        <a href="https://github.com/jamesonstone">GitHub</a>
        <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
        <a href="mailto:jameson@stone.tc">Email</a>
      </nav>
    </footer>
    <script src="{{ '/assets/js/site.js' | relative_url }}"></script>
  </body>
</html>
