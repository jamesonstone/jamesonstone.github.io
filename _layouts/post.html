---
layout: default
---
<article class="post">
  <header class="post-header">
    {% if page.archive %}
      <p class="eyebrow">Archive post</p>
    {% else %}
      <p class="eyebrow">Post</p>
    {% endif %}
    <h1>{{ page.title }}</h1>
    <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
    {% if page.date_uncertain %}
      <p class="note">Date reconstructed from legacy repository history.</p>
    {% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <footer class="post-footer">
    <a href="{{ '/blog/' | relative_url }}">Back to blog</a>
  </footer>
</article>
